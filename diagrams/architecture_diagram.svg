<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    
    <!-- Box Gradients -->
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="logicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.15"/>
    </linearGradient>
    
    <!-- Shadow Effect -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="45" font-family="'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="1">HIREEQUITY — ARCHITECTURE DIAGRAM</text>
  <text x="400" y="68" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">System Modules & Data Flow</text>

  <!-- Left: User Interaction / Client Layer -->
  <g transform="translate(40, 120)" filter="url(#dropShadow)">
    <rect width="200" height="420" rx="16" fill="url(#frontGrad)" stroke="#475569" stroke-width="1.5"/>
    <text x="100" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FF7A00" text-anchor="middle">STREAMLIT FRONTEND</text>
    <line x1="20" y1="45" x2="180" y2="45" stroke="#334155" stroke-width="1"/>
    
    <!-- Sub-boxes -->
    <rect x="15" y="60" width="170" height="70" rx="8" fill="#0F172A" stroke="#FF7A00" stroke-width="1"/>
    <text x="100" y="85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Page 1: JD Input</text>
    <text x="100" y="105" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Paste Draft / Generate</text>
    
    <rect x="15" y="145" width="170" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="100" y="170" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Page 2: Bias Audit</text>
    <text x="100" y="190" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Highlights & Flags Table</text>
    
    <rect x="15" y="230" width="170" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="100" y="255" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Page 3: Auto Fix</text>
    <text x="100" y="275" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Strikethrough / PDF Export</text>

    <rect x="15" y="315" width="170" height="70" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <text x="100" y="340" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Page 4: Insights</text>
    <text x="100" y="360" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Demographic Forecasts</text>
  </g>

  <!-- Middle Layer: Business Logic -->
  <g transform="translate(290, 120)" filter="url(#dropShadow)">
    <rect width="220" height="420" rx="16" fill="url(#frontGrad)" stroke="#475569" stroke-width="1.5"/>
    <text x="110" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#FFB800" text-anchor="middle">CORE APP LOGIC</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#334155" stroke-width="1"/>

    <!-- logic boxes -->
    <rect x="15" y="60" width="190" height="70" rx="8" fill="url(#logicGrad)" stroke="#FF7A00" stroke-width="1.5"/>
    <text x="110" y="85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">bias_detector.py</text>
    <text x="110" y="105" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">Static / Semantic Auditor</text>
    
    <rect x="15" y="145" width="190" height="70" rx="8" fill="url(#logicGrad)" stroke="#FFB800" stroke-width="1"/>
    <text x="110" y="170" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">jd_generator.py</text>
    <text x="110" y="190" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">Inclusive JD Builder Prompt</text>
    
    <rect x="15" y="230" width="190" height="70" rx="8" fill="url(#logicGrad)" stroke="#FFB800" stroke-width="1"/>
    <text x="110" y="255" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">rewriter.py</text>
    <text x="110" y="275" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">Optimization & Rephrase Engine</text>

    <rect x="15" y="315" width="190" height="70" rx="8" fill="url(#logicGrad)" stroke="#38BDF8" stroke-width="1"/>
    <text x="110" y="340" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">pdf_export.py</text>
    <text x="110" y="360" font-family="sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">ReportLab Document Builder</text>
  </g>

  <!-- Right Layer: External Services & Data -->
  <g transform="translate(560, 120)" filter="url(#dropShadow)">
    <rect width="200" height="420" rx="16" fill="url(#frontGrad)" stroke="#475569" stroke-width="1.5"/>
    <text x="100" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#10B981" text-anchor="middle">RESOURCES & APIs</text>
    <line x1="20" y1="45" x2="180" y2="45" stroke="#334155" stroke-width="1"/>

    <!-- Database / File resources -->
    <rect x="15" y="60" width="170" height="70" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
    <text x="100" y="85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">wordlists.py</text>
    <text x="100" y="105" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Gaucher Lexicon & Suggs</text>
    
    <!-- API -->
    <rect x="15" y="145" width="170" height="155" rx="8" fill="url(#apiGrad)" stroke="#10B981" stroke-width="1.5"/>
    <text x="100" y="175" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34D399" text-anchor="middle">GROQ CLOUD API</text>
    <text x="100" y="195" font-family="sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Model:</text>
    <text x="100" y="210" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC" text-anchor="middle">llama-3.1-8b-instant</text>
    
    <path d="M 50,240 Q 100,225 150,240" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="100" y="260" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">HTTPS Request/JSON Response</text>

    <!-- OS / Environment Config -->
    <rect x="15" y="315" width="170" height="70" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
    <text x="100" y="340" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">System Env (.env)</text>
    <text x="100" y="360" font-family="sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Local API Credentials</text>
  </g>

  <!-- Connectors (Arrows) -->
  <!-- Streamlit -> Logic -->
  <g fill="none" stroke="#64748B" stroke-width="2">
    <!-- Page 1 -> generator -->
    <path d="M 240,195 L 290,195"/>
    <!-- Page 2 -> detector -->
    <path d="M 240,275 Q 265,240 290,205"/>
    <!-- Page 3 -> rewriter / pdf -->
    <path d="M 240,355 Q 265,310 290,290"/>
    <path d="M 240,355 Q 265,380 290,400"/>
  </g>

  <!-- Logic -> APIs -->
  <g fill="none" stroke="#10B981" stroke-width="2">
    <!-- detector -> wordlists -->
    <path d="M 510,205 Q 535,190 560,195" stroke="#475569"/>
    <!-- detector -> Groq API -->
    <path d="M 510,205 Q 535,225 560,230"/>
    <!-- generator -> Groq API -->
    <path d="M 510,285 Q 535,280 560,265"/>
    <!-- rewriter -> Groq API -->
    <path d="M 510,365 Q 535,310 560,280"/>
  </g>
  
  <!-- Arrow Markers -->
  <g fill="#FF7A00">
    <polygon points="290,195 282,191 282,199"/>
    <polygon points="290,205 282,201 283,209"/>
    <polygon points="290,290 282,286 283,294"/>
    <polygon points="290,400 282,396 283,404"/>
  </g>
  <g fill="#10B981">
    <polygon points="560,195 552,191 552,199" fill="#475569"/>
    <polygon points="560,230 552,226 552,234"/>
    <polygon points="560,265 552,261 552,269"/>
    <polygon points="560,280 552,276 552,284"/>
  </g>
</svg>
